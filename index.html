<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Kinova Sign In</title>
</head>
<body>
<h2>Signing you in...</h2>

<script>
(async function () {

  const sessionId = new URLSearchParams(location.search).get("sessionId");

  const hash = new URLSearchParams(location.hash.slice(1));

  const accessToken = hash.get("access_token");
  const refreshToken = hash.get("refresh_token");

  if (!accessToken) {
    document.body.innerHTML = "<h2>No access token returned</h2>";
    return;
  }

  const res = await fetch(
    "https://urtfcggdyuhstjpqjxoh.supabase.co/rest/v1/auth_sessions",
    {
      method: "POST",
      headers: {
        "Authorization": "Bearer " + accessToken,
        "apikey": "YOUR_ANON_KEY",
        "Content-Type": "application/json",
        "Prefer": "return=minimal"
      },
      body: JSON.stringify({
        session_id: sessionId,
        access_token: accessToken,
        refresh_token: refreshToken
      })
    }
  );

  if (res.ok) {
    document.body.innerHTML =
      "<h2>Login successful. Return to After Effects.</h2>";
  } else {
    document.body.innerHTML =
      "<h2>Failed.</h2><pre>" + await res.text() + "</pre>";
  }

})();
</script>
</body>
</html>
